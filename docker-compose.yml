version: '3.8'

services:
  # ==================== 数据库层 ====================
  postgres:
    image: postgres:17-alpine
    container_name: benchmark-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-benchmark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-benchmark123}
      POSTGRES_DB: ${POSTGRES_DB:-benchmark}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./init/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_backup:/backup
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-benchmark} -d ${POSTGRES_DB:-benchmark}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      backend:
        aliases:
          - postgres
          - db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== 工具服务 ====================
  data-generator:
    build:
      context: ./init/generate_data
      dockerfile: Dockerfile
    container_name: benchmark-data-generator
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-benchmark}
      POSTGRES_USER: ${POSTGRES_USER:-benchmark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-benchmark123}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    profiles:
      - tools
    volumes:
      - ./init/generate_data:/app:ro

  # ==================== 后端服务层 ====================
  java-api:
    build:
      context: ./java
      dockerfile: Dockerfile
      args:
        - GRADLE_OPTS=${GRADLE_OPTS:-}
    container_name: benchmark-java
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-benchmark}
      DATABASE_USERNAME: ${POSTGRES_USER:-benchmark}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-benchmark123}
      API_KEY: ${API_KEY:-benchmark-api-key-2024}
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx1024m}
    ports:
      - "${JAVA_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    volumes:
      - export_temp:/tmp/exports

  golang-api:
    build:
      context: ./golang
      dockerfile: Dockerfile
    container_name: benchmark-golang
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-benchmark}:${POSTGRES_PASSWORD:-benchmark123}@postgres:5432/${POSTGRES_DB:-benchmark}?sslmode=disable
      API_KEY: ${API_KEY:-benchmark-api-key-2024}
      GIN_MODE: ${GIN_MODE:-release}
    ports:
      - "${GOLANG_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    volumes:
      - export_temp:/tmp/exports

  python-api:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: benchmark-python
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-benchmark}:${POSTGRES_PASSWORD:-benchmark123}@postgres:5432/${POSTGRES_DB:-benchmark}
      API_KEY: ${API_KEY:-benchmark-api-key-2024}
      WORKERS: ${PYTHON_WORKERS:-4}
    ports:
      - "${PYTHON_PORT:-8082}:8082"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    volumes:
      - export_temp:/tmp/exports

  rust-api:
    build:
      context: ./rust
      dockerfile: Dockerfile
    container_name: benchmark-rust
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-benchmark}:${POSTGRES_PASSWORD:-benchmark123}@postgres:5432/${POSTGRES_DB:-benchmark}
      API_KEY: ${API_KEY:-benchmark-api-key-2024}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "${RUST_PORT:-8083}:8083"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    volumes:
      - export_temp:/tmp/exports

  # ==================== 前端服务层 ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_KEY=${API_KEY:-benchmark-api-key-2024}
        - VITE_JAVA_API_URL=${VITE_JAVA_API_URL:-http://localhost:8080}
        - VITE_GOLANG_API_URL=${VITE_GOLANG_API_URL:-http://localhost:8081}
        - VITE_PYTHON_API_URL=${VITE_PYTHON_API_URL:-http://localhost:8082}
        - VITE_RUST_API_URL=${VITE_RUST_API_URL:-http://localhost:8083}
    container_name: benchmark-frontend
    environment:
      VITE_API_KEY: ${API_KEY:-benchmark-api-key-2024}
      VITE_JAVA_API_URL: ${VITE_JAVA_API_URL:-http://localhost:8080}
      VITE_GOLANG_API_URL: ${VITE_GOLANG_API_URL:-http://localhost:8081}
      VITE_PYTHON_API_URL: ${VITE_PYTHON_API_URL:-http://localhost:8082}
      VITE_RUST_API_URL: ${VITE_RUST_API_URL:-http://localhost:8083}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - java-api
      - golang-api
      - python-api
      - rust-api
    networks:
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== 监控服务层 ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: benchmark-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitor/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}'
      - '--storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-10GB}'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - monitor
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: benchmark-cadvisor
    ports:
      - "${CADVISOR_PORT:-8084}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: benchmark-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-benchmark}:${POSTGRES_PASSWORD:-benchmark123}@postgres:5432/${POSTGRES_DB:-benchmark}?sslmode=disable"
    ports:
      - "${POSTGRES_EXPORTER_PORT:-9187}:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - monitor
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest
    container_name: benchmark-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      GF_INSTALL_PLUGINS: ""
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitor/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitor/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - monitor
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  # 前端网络 - 前端和后端服务通信
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
  # 后端网络 - 后端服务和数据库通信
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16
  # 监控网络 - 监控服务通信
  monitor:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

volumes:
  postgres_data:
    driver: local
  postgres_backup:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  export_temp:
    driver: local
