# =============================================================================
# PostgreSQL 17 性能优化配置
# 适用于基准测试场景，针对 SSD 存储和高并发读写优化
# =============================================================================

# -----------------------------------------------------------------------------
# 连接设置
# -----------------------------------------------------------------------------
# 最大连接数，根据并发测试需求设置
max_connections = 200

# 监听地址（容器内使用）
listen_addresses = '*'
port = 5432

# 超级用户连接数保留
superuser_reserved_connections = 3

# -----------------------------------------------------------------------------
# 内存配置
# -----------------------------------------------------------------------------
# 共享缓冲区，建议设置为系统内存的 25%
# 对于 1GB 内存系统，设置为 256MB
shared_buffers = 256MB

# 工作内存，每个查询操作可用内存
# 增大可提高排序、哈希操作性能
work_mem = 16MB

# 维护操作内存（VACUUM, CREATE INDEX 等）
maintenance_work_mem = 256MB

# 自动清理工作内存
autovacuum_work_mem = 256MB

# 有效缓存大小，优化器估计可用内存
# 建议设置为系统内存的 50-75%
effective_cache_size = 1GB

# 巨大页面设置（容器环境通常不使用）
huge_pages = try

# -----------------------------------------------------------------------------
# WAL 配置
# -----------------------------------------------------------------------------
# WAL 缓冲区
wal_buffers = 16MB

# 检查点完成目标，0.9 表示检查点在检查点间隔的 90% 时间内完成
# 降低 I/O 峰值
checkpoint_completion_target = 0.9

# 最大 WAL 大小
max_wal_size = 2GB

# 最小 WAL 大小
min_wal_size = 1GB

# 检查点超时
checkpoint_timeout = 15min

# WAL 写入延迟
wal_writer_delay = 200ms

# -----------------------------------------------------------------------------
# 查询优化器
# -----------------------------------------------------------------------------
# 随机页面成本，SSD 设置为 1.1
# 传统硬盘为 4.0
random_page_cost = 1.1

# 顺序页面成本
seq_page_cost = 1.0

# 有效 I/O 并发，SSD 设置为 200
effective_io_concurrency = 200

# CPU 相关成本
cpu_tuple_cost = 0.01
cpu_index_tuple_cost = 0.005
cpu_operator_cost = 0.0025

# 并行查询设置
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4

# 默认统计目标
default_statistics_target = 100

# -----------------------------------------------------------------------------
# 日志配置
# -----------------------------------------------------------------------------
# 日志目的地
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'

# 日志级别
log_min_messages = warning
log_min_error_statement = error
log_min_duration_statement = 1000  # 记录超过 1 秒的慢查询

# 记录内容
log_connections = on
log_disconnections = on
log_duration = off
log_line_prefix = '%t [%p] [%l-1] user=%u,db=%d,app=%a,client=%h '
log_lock_waits = on
log_statement = 'ddl'

# 检查点日志
log_checkpoints = on

# -----------------------------------------------------------------------------
# 自动清理
# -----------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
autovacuum_vacuum_cost_limit = 2000
autovacuum_vacuum_cost_delay = 2ms

# -----------------------------------------------------------------------------
# 客户端默认设置
# -----------------------------------------------------------------------------
# 默认事务隔离级别
default_transaction_isolation = 'read committed'

# 时区
timezone = 'Asia/Shanghai'

# 日期格式
datestyle = 'iso, mdy'

# 字符集
client_encoding = utf8

# 默认文本搜索配置
default_text_search_config = 'pg_catalog.english'

# -----------------------------------------------------------------------------
# 锁管理
# -----------------------------------------------------------------------------
# 死锁超时
deadlock_timeout = 1s

# 最大锁数
max_locks_per_transaction = 128

# -----------------------------------------------------------------------------
# 统计信息
# -----------------------------------------------------------------------------
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all

# 统计监控器
stats_temp_directory = 'pg_stat_tmp'

# -----------------------------------------------------------------------------
# 其他优化
# -----------------------------------------------------------------------------
# 约束排除
constraint_exclusion = partition

# 标准符合字符串
standard_conforming_strings = on

# 动态库路径
dynamic_library_path = '$libdir'

# 密码加密
password_encryption = scram-sha-256

# 同步提交（性能优先时可关闭，但有数据丢失风险）
synchronous_commit = on

# 预加载库
shared_preload_libraries = 'pg_stat_statements'

# pg_stat_statements 配置
pg_stat_statements.track = all
pg_stat_statements.max = 10000
