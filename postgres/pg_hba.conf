# =============================================================================
# PostgreSQL 客户端认证配置文件 (pg_hba.conf)
# 管理客户端连接的访问控制规则
# ==============================================================================
# 格式说明：
# TYPE  DATABASE        USER            ADDRESS                 METHOD
# =============================================================================

# 本地 Unix 套接字连接
local   all             all                                     trust

# IPv4 本地连接
host    all             all             127.0.0.1/32            scram-sha-256

# IPv6 本地连接
host    all             all             ::1/128                 scram-sha-256

# Docker 内部网络连接（benchmark-network: 172.x.x.x）
# 允许所有 Docker 容器通过密码认证连接
host    all             all             172.16.0.0/12           scram-sha-256
host    all             all             172.17.0.0/16           scram-sha-256
host    all             all             172.18.0.0/16           scram-sha-256
host    all             all             172.19.0.0/16           scram-sha-256
host    all             all             172.20.0.0/16           scram-sha-256
host    all             all             172.21.0.0/16           scram-sha-256
host    all             all             172.22.0.0/16           scram-sha-256
host    all             all             172.23.0.0/16           scram-sha-256
host    all             all             172.24.0.0/16           scram-sha-256
host    all             all             172.25.0.0/16           scram-sha-256
host    all             all             172.26.0.0/16           scram-sha-256
host    all             all             172.27.0.0/16           scram-sha-256
host    all             all             172.28.0.0/16           scram-sha-256
host    all             all             172.29.0.0/16           scram-sha-256
host    all             all             172.30.0.0/16           scram-sha-256
host    all             all             172.31.0.0/16           scram-sha-256

# 允许外部主机连接（开发测试环境）
# 生产环境应限制具体 IP 或使用 VPN
host    all             all             0.0.0.0/0               scram-sha-256

# 复制连接（主从复制使用）
host    replication     all             127.0.0.1/32            scram-sha-256
host    replication     all             ::1/128                 scram-sha-256
host    replication     all             172.16.0.0/12           scram-sha-256
