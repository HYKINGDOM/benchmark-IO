# Prometheus 配置文件
# 用于监控多语言基准测试系统

global:
  # 抓取间隔
  scrape_interval: 15s
  # 规则评估间隔
  evaluation_interval: 15s
  # 抓取超时时间
  scrape_timeout: 10s

# 告警管理器配置（可选）
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# 抓取配置
scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'
          service: 'monitoring'

  # cAdvisor - 容器资源监控
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          instance: 'cadvisor'
          service: 'container-monitoring'
    # 抓取更频繁以获取准确的容器指标
    scrape_interval: 10s

  # PostgreSQL Exporter - 数据库监控
  # 注意：需要单独部署 postgres_exporter 容器
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']
        labels:
          instance: 'postgres'
          service: 'database'
    scrape_interval: 15s

  # Java API 服务监控
  - job_name: 'java-api'
    static_configs:
      - targets: ['java-api:8080']
        labels:
          instance: 'java-api'
          service: 'backend'
          language: 'java'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s

  # Golang API 服务监控
  - job_name: 'golang-api'
    static_configs:
      - targets: ['golang-api:8081']
        labels:
          instance: 'golang-api'
          service: 'backend'
          language: 'golang'
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Python API 服务监控
  - job_name: 'python-api'
    static_configs:
      - targets: ['python-api:8082']
        labels:
          instance: 'python-api'
          service: 'backend'
          language: 'python'
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Rust API 服务监控
  - job_name: 'rust-api'
    static_configs:
      - targets: ['rust-api:8083']
        labels:
          instance: 'rust-api'
          service: 'backend'
          language: 'rust'
    metrics_path: '/metrics'
    scrape_interval: 15s

# 数据保留配置（通过启动参数设置）
# --storage.tsdb.retention.time=30d
